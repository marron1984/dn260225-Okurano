name: 動画生成

on:
  workflow_dispatch:
    inputs:
      languages:
        description: '言語（カンマ区切り: ja,en,zh_cn,zh_tw,ko,fr,de,th,pt,pt_br,tl,vi）'
        required: true
        default: 'ja,en,zh_cn,zh_tw,ko,fr,de,th,pt,pt_br,tl,vi'
      courses:
        description: 'コース（カンマ区切り: seiran,kikyou）'
        required: true
        default: 'seiran,kikyou'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: フォントをインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto-cjk fonts-noto-core fonts-noto-extra
          fc-cache -f
          echo "--- フォント確認 ---"
          fc-list | grep -i "noto serif" | head -10

      - name: 動画を生成
        run: |
          ARGS=""
          IFS=',' read -ra LANGS <<< "${{ inputs.languages }}"
          for lang in "${LANGS[@]}"; do
            lang=$(echo "$lang" | tr -d ' ')
            [ -n "$lang" ] && ARGS="$ARGS --lang $lang"
          done
          IFS=',' read -ra COURSES <<< "${{ inputs.courses }}"
          for course in "${COURSES[@]}"; do
            course=$(echo "$course" | tr -d ' ')
            [ -n "$course" ] && ARGS="$ARGS --course $course"
          done
          echo "実行: python3 generator/generate.py $ARGS"
          python3 generator/generate.py $ARGS

      - name: 生成結果をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output*/*_reel.mp4
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "動画自動生成: ${{ inputs.languages }} × ${{ inputs.courses }}"
            git push
          fi
