<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大嵓埜 — Instagram Reel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      font-size: 1rem;
      color: #888;
      letter-spacing: 0.3em;
      margin-bottom: 1.5rem;
    }
    .selector {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .selector-label {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .tabs {
      display: flex;
      gap: 0;
    }
    .tab {
      padding: 0.55rem 1.5rem;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: #888;
      background: transparent;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab:first-child { border-radius: 6px 0 0 6px; }
    .tab:last-child { border-radius: 0 6px 6px 0; }
    .tab:not(:first-child) { border-left: none; }
    .tab.active {
      color: #E8D0A0;
      border-color: #E8D0A0;
      background: rgba(232, 208, 160, 0.08);
    }
    .tab:hover:not(.active) {
      color: #bbb;
      border-color: #555;
    }
    .lang-tabs .tab {
      padding: 0.4rem 1rem;
      font-size: 0.78rem;
    }
    .video-container {
      max-width: 400px;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    video {
      width: 100%;
      display: block;
    }
    .course-info {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.85rem;
      color: #777;
      letter-spacing: 0.15em;
      line-height: 1.8;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <h1>大 嵓 埜</h1>
  <p class="subtitle">北新地・懐石料理</p>

  <div class="video-container">
    <video id="player" controls autoplay muted loop playsinline>
      <source src="output2/okurano_kikyou_reel.mp4" type="video/mp4">
    </video>
  </div>

  <div class="course-info">
    桔梗色（ききょういろ）コース　¥23,000
  </div>

  <p class="footer">Instagram Reel Preview</p>
</body>
</html>
