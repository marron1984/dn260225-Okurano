<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大嵓埜 — 青藍色コース Instagram Reel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      font-size: 1rem;
      color: #888;
      letter-spacing: 0.3em;
      margin-bottom: 2rem;
    }
    .video-container {
      max-width: 400px;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    video {
      width: 100%;
      display: block;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <h1>大 嵓 埜</h1>
  <p class="subtitle">青藍色（せいらんいろ）コース</p>
  <div class="video-container">
    <video controls autoplay muted loop playsinline>
      <source src="output/okurano_reel.mp4" type="video/mp4">
      お使いのブラウザは動画再生に対応していません。
    </video>
  </div>
  <p class="footer">Instagram Reel Preview</p>
</body>
</html>
