<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大嵓埜 — Instagram Reel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      font-size: 1rem;
      color: #888;
      letter-spacing: 0.3em;
      margin-bottom: 1.5rem;
    }
    .selector {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .selector-label {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .tabs {
      display: flex;
      gap: 0;
    }
    .tab {
      padding: 0.55rem 1.5rem;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: #888;
      background: transparent;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab:first-child { border-radius: 6px 0 0 6px; }
    .tab:last-child { border-radius: 0 6px 6px 0; }
    .tab:not(:first-child) { border-left: none; }
    .tab.active {
      color: #E8D0A0;
      border-color: #E8D0A0;
      background: rgba(232, 208, 160, 0.08);
    }
    .tab:hover:not(.active) {
      color: #bbb;
      border-color: #555;
    }
    .lang-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    .lang-tabs .tab {
      padding: 0.4rem 1rem;
      font-size: 0.78rem;
      border-radius: 0;
    }
    .lang-tabs .tab:nth-child(1) { border-radius: 6px 0 0 0; }
    .lang-tabs .tab:nth-child(3) { border-radius: 0 6px 0 0; }
    .lang-tabs .tab:nth-child(4) { border-radius: 0 0 0 6px; border-top: none; }
    .lang-tabs .tab:nth-child(5) { border-top: none; }
    .lang-tabs .tab:nth-child(6) { border-radius: 0 0 6px 0; border-top: none; }
    .lang-tabs .tab:nth-child(n+4) { border-left: 1px solid #333; }
    .lang-tabs .tab:nth-child(2),
    .lang-tabs .tab:nth-child(3),
    .lang-tabs .tab:nth-child(5),
    .lang-tabs .tab:nth-child(6) { border-left: none; }
    .tab.unavailable {
      color: #444;
      border-color: #222;
      background: rgba(255,255,255,0.02);
      cursor: default;
    }
    .tab.unavailable:hover { color: #444; border-color: #222; }
    .video-container {
      max-width: 400px;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    video {
      width: 100%;
      display: block;
    }
    .course-info {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.85rem;
      color: #777;
      letter-spacing: 0.15em;
      line-height: 1.8;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <h1>大 嵓 埜</h1>
  <p class="subtitle">北新地・懐石料理</p>

  <div class="selector">
    <span class="selector-label">コース</span>
    <div class="tabs course-tabs">
      <button class="tab active" data-course="seiran" onclick="switchCourse('seiran')">青藍色　¥18,000</button>
      <button class="tab" data-course="kikyou" onclick="switchCourse('kikyou')">桔梗色　¥23,000</button>
    </div>
  </div>

  <div class="selector">
    <span class="selector-label">言語</span>
    <div class="tabs lang-tabs">
      <button class="tab active" data-lang="ja" onclick="switchLang('ja')">日本語</button>
      <button class="tab" data-lang="en" onclick="switchLang('en')">English</button>
      <button class="tab" data-lang="zh" onclick="switchLang('zh')">中文</button>
      <button class="tab" data-lang="fr" onclick="switchLang('fr')">Français</button>
      <button class="tab" data-lang="de" onclick="switchLang('de')">Deutsch</button>
      <button class="tab" data-lang="th" onclick="switchLang('th')">ไทย</button>
    </div>
  </div>

  <div class="video-container">
    <video id="player" controls autoplay muted loop playsinline>
      <source id="videoSrc" src="output/okurano_reel.mp4" type="video/mp4">
    </video>
  </div>

  <div class="course-info" id="courseInfo">
    青藍色（せいらんいろ）コース　¥18,000
  </div>

  <p class="footer">Instagram Reel Preview</p>

  <script>
    const videos = {
      seiran: {
        ja:  { src: 'output/okurano_reel.mp4',              label: '青藍色（せいらんいろ）コース　¥18,000' },
        en:  { src: 'output3/okurano_seiran_en_reel.mp4',    label: 'Seiran Blue Course　¥18,000' },
        zh:  { src: 'output5/okurano_seiran_zh_reel.mp4',    label: '青蓝色套餐　¥18,000' },
        fr:  { src: 'output6/okurano_seiran_fr_reel.mp4',    label: 'Menu Seiran — Bleu Céruléen　¥18,000' },
        de:  { src: 'output7/okurano_seiran_de_reel.mp4',    label: 'Menü Seiran — Azurblau　¥18,000' },
        th:  { src: 'output8/okurano_seiran_th_reel.mp4',    label: 'เมนูเซรัน — สีฟ้าคราม　¥18,000' }
      },
      kikyou: {
        ja:  { src: 'output2/okurano_kikyou_reel.mp4',      label: '桔梗色（ききょういろ）コース　¥23,000' },
        en:  { src: 'output4/okurano_kikyou_en_reel.mp4',    label: 'Kikyou Purple Course　¥23,000' },
        zh:  null,
        fr:  null,
        de:  null,
        th:  null
      }
    };

    let currentCourse = 'seiran';
    let currentLang = 'ja';

    function switchCourse(name) {
      currentCourse = name;
      document.querySelectorAll('.course-tabs .tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.course-tabs [data-course="${name}"]`).classList.add('active');
      updateAvailability();
      updateVideo();
    }

    function switchLang(lang) {
      if (!videos[currentCourse]?.[lang]) return;
      currentLang = lang;
      document.querySelectorAll('.lang-tabs .tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.lang-tabs [data-lang="${lang}"]`).classList.add('active');
      updateVideo();
    }

    function updateAvailability() {
      document.querySelectorAll('.lang-tabs .tab').forEach(t => {
        const lang = t.dataset.lang;
        const available = !!videos[currentCourse]?.[lang];
        t.classList.toggle('unavailable', !available);
        if (!available && t.classList.contains('active')) {
          t.classList.remove('active');
          currentLang = 'ja';
          document.querySelector('.lang-tabs [data-lang="ja"]').classList.add('active');
        }
      });
    }

    function updateVideo() {
      const player = document.getElementById('player');
      const src = document.getElementById('videoSrc');
      const info = document.getElementById('courseInfo');
      const entry = videos[currentCourse]?.[currentLang];

      if (!entry) {
        info.textContent = '（この組み合わせは未作成です）';
        return;
      }

      src.src = entry.src;
      info.textContent = entry.label;
      player.load();
      player.play();
    }

    updateAvailability();
  </script>
</body>
</html>
